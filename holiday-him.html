<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Holiday Him | Coming Soon</title>

<style>

/* ===== BODY ===== */
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  height: 100vh;
  background: linear-gradient(135deg, #020617, #0f172a);
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
  overflow: hidden;
}

/* ===== BACKGROUND GLOW ===== */
body::before {
  content: "";
  position: absolute;
  width: 400px;
  height: 400px;
  background: #6366f1;
  filter: blur(150px);
  opacity: 0.3;
  top: -100px;
  left: -100px;
}

body::after {
  content: "";
  position: absolute;
  width: 300px;
  height: 300px;
  background: #22c55e;
  filter: blur(150px);
  opacity: 0.3;
  bottom: -100px;
  right: -100px;
}

/* ===== CARD ===== */
.container {
  text-align: center;
  z-index: 2;
  animation: fadeIn 1s ease;
}

h1 {
  font-size: 60px;
  letter-spacing: 4px;
  margin-bottom: 10px;
}

p {
  font-size: 18px;
  color: #cbd5e1;
  margin-bottom: 30px;
}

/* ===== BUTTON ===== */
.btn {
  padding: 12px 30px;
  border: none;
  border-radius: 30px;
  background: linear-gradient(45deg, #6366f1, #22c55e);
  color: white;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.05);
}

/* ===== LOADING DOTS ===== */
.loader {
  margin-top: 20px;
}

.loader span {
  display: inline-block;
  width: 8px;
  height: 8px;
  margin: 5px;
  background: white;
  border-radius: 50%;
  animation: bounce 0.6s infinite alternate;
}

.loader span:nth-child(2) {
  animation-delay: 0.2s;
}
.loader span:nth-child(3) {
  animation-delay: 0.4s;
}

@keyframes bounce {
  to {
    transform: translateY(-10px);
  }
}

/* ===== FADE ANIMATION ===== */
@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(40px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

</style>
</head>

<body>

<div class="container">
  <h1>COMING SOON</h1>
  <p>Holiday Collection for Him is on the way 🚀</p>

  <button class="btn" onclick="goBack()">Go Back</button>

  <div class="loader">
    <span></span><span></span><span></span>
  </div>
</div>

<script>
function goBack() {
  window.location.href = "index.html";
}
</script>

</body>
</html>
