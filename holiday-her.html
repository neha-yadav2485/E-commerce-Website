<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Holiday Collection - For Her</title>

<link rel="stylesheet" href="collection.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

    <!-- HERO BANNER -->
    <section class="collection-hero">
      <h1>Holiday Collection - For Her</h1>
      <p>Luxury fits curated for every vibe</p>
    </section>

<!-- FILTER BAR -->
<div class="filter-bar">
  <select id="categoryFilter" onchange="filterProducts()">
  <option value="all">Category</option>
  <option value="Mini Dress">Mini Dress</option>
  <option value="Beach Outfit">Beachy fits</option>
  <option value="Party Edition">Party Edition</option>
</select>

<select id="priceFilter" onchange="filterProducts()">
  <option value="all">Price</option>
  <option value="low">Under ₹500</option>
  <option value="mid">₹500 - ₹1000</option>
  <option value="high">Above ₹1000</option>
</select>
</div>

<div class="product-grid">

  <!-- Product Card 1-->
  <div class="product-card" data-category="Mini Dress" data-price="1199" data-size="XS,S,M" data-name="Mini Red Dress" data-sizechart="COLLECTION for website\HOLIDAY COLLECTION FOR HER\RED_dress chart.jpeg">
    <div class="product-img">
    <img src="COLLECTION for website/HOLIDAY COLLECTION FOR HER/og mini red dress.jpg">
    <i class="fa-regular fa-heart wishlist" onclick="addToWishlist(this, 'Mini Dress', 1199, 'COLLECTION for website/HOLIDAY COLLECTION FOR HER/og mini red dress.jpg')"></i>
    </div>
    <h3>Mini Red Dress</h3>
    <p>₹1199</p>

    <!-- SIZE SELECTOR -->
  <div class="size-selector">
    <span class="size-btn">XS</span>
    <span class="size-btn">S</span>
    <span class="size-btn">M</span>
  </div>
    <div class="product-actions">
      <button class="size-chart-btn" onclick="openSizeChart(this)">Size Chart</button>
      <button class="add-cart-btn" onclick="addToCartWithSize(this, 'Mini Dress', 1199)">Add to Cart</button>
    </div>
  </div>

<!-- Product Card 2-->
<div class="product-card" data-category="Mini Dress" data-price="1999" data-size="XS,S,M" data-name="Sweetheart Neck Mini Dress" data-sizechart="COLLECTION for website\HOLIDAY COLLECTION FOR HER\pink_dress chart.jpeg">
  <div class="product-img">
    <img src="COLLECTION for website/HOLIDAY COLLECTION FOR HER/PARTY EDITION/Sweetheart Neck Lantern Sleeve Mini Dress/pink pastel Sweetheart Neck Lantern Sleeve Ruched Mini Dress.jpg" alt="Sweetheart Neck Mini Dress">
    <i class="fa-regular fa-heart wishlist" onclick="addToWishlist(this, 'Mini Dress', 1999, 'COLLECTION for website/HOLIDAY COLLECTION FOR HER/PARTY EDITION/Sweetheart Neck Lantern Sleeve Mini Dress/pink pastel Sweetheart Neck Lantern Sleeve Ruched Mini Dress.jpg')"></i>
  </div>

  <h3>Sweetheart Neck Mini Dress</h3>
  <p>₹1999</p>

  <div class="size-selector">
    <span class="size-btn">XS</span>
    <span class="size-btn">S</span>
    <span class="size-btn">M</span>
  </div>

  <div class="product-actions">
    <button class="size-chart-btn" onclick="openSizeChart(this)">Size Chart</button>
    <button class="add-cart-btn" onclick="addToCartWithSize(this, 'Mini Dress', 1999)">Add to Cart</button>
  </div>
</div>

  <!-- Product Card 3 -->
  <div class="product-card" data-category="Party Edition" data-price="1299" data-size="XS,S,M" data-name="Knit fabric Dress" data-sizechart="COLLECTION for website\HOLIDAY COLLECTION FOR HER\simmer_dress chart.jpeg">
    <div class="product-img">
    <img src="COLLECTION for website/HOLIDAY COLLECTION FOR HER/PARTY EDITION/Knit Fabric Cowl Neck Maxi Dress/dark blue front Knit Fabric Cowl Neck Glitter Maxi Dress.jpg">
    <i class="fa-regular fa-heart wishlist" onclick="addToWishlist(this, 'Party Edition', 1299,'COLLECTION for website/HOLIDAY COLLECTION FOR HER/PARTY EDITION/Knit Fabric Cowl Neck Maxi Dress/dark blue front Knit Fabric Cowl Neck Glitter Maxi Dress.jpg')"></i>
    </div>
    <h3>Knit fabric Dress</h3>
    <p>₹1299</p>

    <!-- SIZE SELECTOR -->
  <div class="size-selector">
    <span class="size-btn">XS</span>
    <span class="size-btn">S</span>
    <span class="size-btn">M</span>
  </div>
    <div class="product-actions">
      <button class="size-chart-btn" onclick="openSizeChart(this)">Size Chart</button>
      <button class="add-cart-btn" onclick="addToCartWithSize(this, 'Party Edition', 1299)">Add to Cart</button>
    </div>
  </div>

  <!-- Product Card 4-->
  <div class="product-card" data-category="Beach Outfit" data-price="599" data-size="XS,S,M" data-name="Swimsuit" data-sizechart="COLLECTION for website\HOLIDAY COLLECTION FOR HER\swimsuit chart.jpeg">
    <div class="product-img">
    <img src="COLLECTION for website/HOLIDAY COLLECTION FOR HER/BEACH OUTFITS/Brown Starfish  One-Piece Swimsuit.jpg">
    <i class="fa-regular fa-heart wishlist" onclick="addToWishlist(this, 'Beach Outfit', 599, 'COLLECTION for website/HOLIDAY COLLECTION FOR HER/BEACH OUTFITS/Brown Starfish  One-Piece Swimsuit.jpg')"></i>
    </div>
    <h3>Swimsuit</h3>
    <p>₹599</p>

    <!-- SIZE SELECTOR -->
  <div class="size-selector">
    <span class="size-btn">XS</span>
    <span class="size-btn">S</span>
    <span class="size-btn">M</span>
  </div>
    <div class="product-actions">
      <button class="size-chart-btn" onclick="openSizeChart(this)">Size Chart</button>
      <button class="add-cart-btn" onclick="addToCartWithSize(this, 'Beach Outfit', 599)">Add to Cart</button>
    </div>
  </div>
</div>

<!-- SIZE CHART MODAL -->
<div id="sizeChartModal" class="size-chart-modal">
  <div class="size-chart-content">
    <span class="close-modal" onclick="closeSizeChart()">&times;</span>
    <h2>Size Chart</h2>

    <div class="size-chart-wrapper">
      <img src="COLLECTION for website/WOMENS COLLECTION/size chart.jpeg" alt="Size Chart">
    </div>
  </div>
</div>  

<div id="toast" class="toast"></div>

<script src="cart.js"></script>
<Script src="collection.js"></Script>

</body>
</html>
